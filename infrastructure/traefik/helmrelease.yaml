apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: traefik
  chart:
    spec:
      chart: traefik
      version: 41.0.2        # <-- chart version from the helm search below
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    service:
      type: LoadBalancer
    ingressClass:
      enabled: true
      isDefaultClass: true          # our Ingress objects (no class set) route here
    providers:
      kubernetesIngress:
        enabled: true               # process classic Ingress resources
